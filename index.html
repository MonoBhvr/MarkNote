<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MarkNote Preview</title>
    <link rel="stylesheet" href="./dist/katex.min.css">
    <style>
      :root {
        --bg: #f4f1ea;
        --panel: #fffdf8;
        --panel-strong: #1f2933;
        --line: #d8d0c3;
        --line-strong: #b9ad9d;
        --text: #22201c;
        --muted: #746b5f;
        --accent: #b45309;
        --accent-soft: #fff1d6;
        --code: #f7efe3;
        color: var(--text);
        background: var(--bg);
        font-family: Georgia, "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      .shell {
        display: grid;
        gap: 18px;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 100vh;
        padding: 22px;
      }

      .hero {
        align-items: end;
        display: flex;
        gap: 18px;
        justify-content: space-between;
      }

      .eyebrow {
        color: var(--accent);
        font: 700 0.75rem/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        letter-spacing: 0.14em;
        margin: 0 0 8px;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(2rem, 4vw, 4rem);
        letter-spacing: -0.05em;
        line-height: 0.95;
        margin: 0;
      }

      .subtitle {
        color: var(--muted);
        line-height: 1.6;
        margin: 10px 0 0;
        max-width: 680px;
      }

      #status {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font: 0.85rem/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        margin: 0;
        padding: 10px 14px;
        white-space: nowrap;
      }

      .workspace {
        display: grid;
        gap: 18px;
        grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.08fr);
        min-height: 0;
      }

      .pane {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: 0 24px 70px rgba(64, 48, 31, 0.1);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 0;
        overflow: hidden;
      }

      .pane-header {
        align-items: center;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        padding: 14px 16px;
      }

      .pane-title {
        font: 700 0.82rem/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        letter-spacing: 0.12em;
        margin: 0;
        text-transform: uppercase;
      }

      .pane-note {
        color: var(--muted);
        font-size: 0.9rem;
      }

      #markdown {
        background: #181611;
        border: 0;
        color: #f8ecd7;
        font: 0.95rem/1.65 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        min-height: 70vh;
        outline: none;
        padding: 20px;
        resize: none;
        width: 100%;
      }

      .preview-wrap {
        min-height: 0;
        overflow: auto;
        padding: 24px;
      }

      #preview {
        line-height: 1.72;
        margin: 0 auto;
        max-width: 820px;
      }

      #preview > :first-child {
        margin-top: 0;
      }

      #preview h1,
      #preview h2,
      #preview h3 {
        letter-spacing: -0.03em;
        line-height: 1.1;
      }

      #preview h1 {
        border-bottom: 1px solid var(--line);
        font-size: 2.4rem;
        padding-bottom: 12px;
      }

      #preview h2 {
        color: #2f2a22;
        font-size: 1.45rem;
        margin-top: 34px;
      }

      #preview a {
        color: #9a3412;
      }

      #preview table {
        border-collapse: collapse;
        width: 100%;
      }

      #preview th,
      #preview td {
        border: 1px solid var(--line-strong);
        padding: 8px 10px;
        text-align: left;
      }

      #preview th {
        background: var(--accent-soft);
      }

      #preview blockquote {
        background: #faf4ea;
        border-left: 4px solid var(--accent);
        margin-left: 0;
        padding: 10px 16px;
      }

      #preview pre {
        background: var(--code);
        border: 0;
        border-radius: 0 0 12px 12px;
        overflow: auto;
        margin: 0;
        padding: 14px;
      }

      #preview .code-frame {
        background: var(--code);
        border: 1px solid var(--line);
        border-radius: 12px;
        margin: 16px 0;
        overflow: hidden;
      }

      #preview .code-toolbar {
        align-items: center;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        min-height: 40px;
        padding: 7px 10px 7px 14px;
      }

      #preview .code-language {
        color: var(--muted);
        font: 700 0.72rem/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      #preview .copy-code {
        background: var(--panel);
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        color: var(--muted);
        cursor: pointer;
        font: 700 0.72rem/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        letter-spacing: 0.08em;
        padding: 7px 10px;
        text-transform: uppercase;
        transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
      }

      #preview .copy-code:hover,
      #preview .copy-code:focus-visible {
        background: var(--accent-soft);
        border-color: var(--accent);
        color: var(--accent);
      }

      #preview .copy-code.is-copied {
        background: #ecfdf5;
        border-color: #059669;
        color: #047857;
      }

      #preview code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      #preview :not(pre) > code {
        background: var(--code);
        border-radius: 5px;
        padding: 2px 5px;
      }

      #preview .hljs-keyword,
      #preview .hljs-selector-tag,
      #preview .hljs-title {
        color: #9f1239;
      }

      #preview .hljs-string,
      #preview .hljs-attr,
      #preview .hljs-symbol {
        color: #0f766e;
      }

      #preview .hljs-number,
      #preview .hljs-literal {
        color: #1d4ed8;
      }

      #preview .hljs-comment {
        color: #78716c;
      }

      #preview .marknote-highlight {
        background: #fff3b0;
        border-radius: 4px;
        padding: 0 3px;
      }

      #preview .marknote-highlight-strong {
        background: #fed7aa;
        border-bottom: 2px solid var(--accent);
        border-radius: 4px;
        padding: 0 3px;
      }

      #preview .marknote-term {
        border-bottom: 1px dotted #5f554b;
        cursor: help;
      }

      #preview .marknote-fold,
      #preview .marknote-block {
        background: var(--marknote-block-color, #fffbf2);
        border: 1px solid var(--line-strong);
        border-radius: 14px;
        margin: 16px 0;
        padding: 12px 14px;
      }

      #preview .marknote-block-has-type:not(.marknote-fold) {
        display: grid;
        gap: 12px;
        grid-template-columns: auto minmax(0, 1fr);
      }

      #preview .marknote-block-marker {
        align-items: center;
        background: rgba(255, 255, 255, 0.65);
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        color: var(--accent);
        display: inline-flex;
        font: 800 0.82rem/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        height: 26px;
        justify-content: center;
        width: 26px;
      }

      #preview .marknote-block-content > :first-child {
        margin-top: 0;
      }

      #preview .marknote-block-content > :last-child {
        margin-bottom: 0;
      }

      #preview .marknote-block-color-red {
        --marknote-block-color: #fff1f2;
      }

      #preview .marknote-block-color-blue {
        --marknote-block-color: #eff6ff;
      }

      #preview .marknote-block-color-green {
        --marknote-block-color: #ecfdf5;
      }

      #preview .marknote-block-color-yellow {
        --marknote-block-color: #fefce8;
      }

      #preview .marknote-block-color-orange {
        --marknote-block-color: #fff7ed;
      }

      #preview .marknote-block-color-purple {
        --marknote-block-color: #faf5ff;
      }

      #preview .marknote-block-color-gray {
        --marknote-block-color: #f5f5f4;
      }

      #preview .marknote-fold summary {
        align-items: center;
        color: var(--accent);
        cursor: pointer;
        display: flex;
        gap: 10px;
        font-weight: 700;
        list-style: none;
      }

      #preview .marknote-fold summary::-webkit-details-marker {
        display: none;
      }

      #preview .marknote-fold summary::before {
        align-items: center;
        background: rgba(180, 83, 9, 0.1);
        border: 1px solid rgba(180, 83, 9, 0.25);
        border-radius: 999px;
        content: '›';
        display: inline-flex;
        flex: 0 0 auto;
        font: 900 1rem/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        height: 22px;
        justify-content: center;
        transition: transform 160ms ease, background 160ms ease;
        width: 22px;
      }

      #preview .marknote-fold[open] summary::before {
        background: rgba(180, 83, 9, 0.16);
        transform: rotate(90deg);
      }

      #preview .marknote-embed,
      #preview .marknote-card {
        display: block;
        margin: 16px 0;
      }

      #preview .marknote-embed img {
        border-radius: 12px;
        max-width: 100%;
      }

      #preview .marknote-embed iframe {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 12px;
        min-height: 180px;
        width: 100%;
      }

      #preview .marknote-card {
        background: #fff7e8;
        border: 1px solid var(--line-strong);
        border-radius: 14px;
        color: #92400e;
        font-weight: 700;
        padding: 14px;
        text-decoration: none;
      }

      .rich-card {
        color: var(--text);
        text-decoration: none;
      }

      .rich-card,
      .rich-card * {
        box-sizing: border-box;
      }

      .rich-card__image {
        background: var(--code);
        display: block;
        object-fit: cover;
        width: 100%;
      }

      .rich-card__domain {
        color: var(--accent);
        font: 800 0.72rem/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .rich-card__title {
        color: var(--text);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.1;
        margin: 0;
      }

      .rich-card__description {
        color: var(--muted);
        line-height: 1.45;
        margin: 0;
      }

      .rich-card--classic {
        background: var(--panel);
        border: 1px solid var(--line-strong);
        display: block;
        overflow: hidden;
        transition: box-shadow 180ms ease, transform 180ms ease;
      }

      .rich-card--classic:hover,
      .rich-card--classic:focus-visible {
        transform: translateY(-4px) scale(1.01);
      }

      .rich-card--classic .rich-card__image {
        aspect-ratio: 1.9 / 1;
      }

      .rich-card--classic .rich-card__body {
        display: grid;
        gap: 10px;
        padding: 18px;
      }

      .rich-card--classic .rich-card__title {
        font-size: 1.45rem;
      }

      .rich-card--row {
        align-items: stretch;
        background: var(--panel);
        border: 1px solid var(--line-strong);
        display: grid;
        gap: 0;
        grid-template-columns: minmax(0, 1fr) 190px;
        overflow: hidden;
        transition: box-shadow 180ms ease, transform 180ms ease;
      }

      .rich-card--row:hover,
      .rich-card--row:focus-visible {
        transform: translateY(-3px);
      }

      .rich-card--row .rich-card__body {
        display: grid;
        gap: 9px;
        padding: 18px;
        text-align: left;
      }

      .rich-card--row .rich-card__image {
        height: 100%;
        min-height: 160px;
      }

      .rich-card--row .rich-card__title {
        font-size: 1.25rem;
      }

      .rich-card--notion {
        align-items: center;
        background: rgba(255, 253, 248, 0.88);
        border: 1px solid var(--line);
        display: grid;
        gap: 12px;
        grid-template-columns: 42px minmax(0, 1fr);
        padding: 12px;
        transition: background 160ms ease, border-color 160ms ease;
      }

      .rich-card--notion:hover,
      .rich-card--notion:focus-visible {
        background: var(--accent-soft);
        border-color: var(--accent);
      }

      .rich-card--notion .rich-card__image {
        aspect-ratio: 1;
        border: 1px solid var(--line);
      }

      .rich-card--notion .rich-card__body {
        min-width: 0;
      }

      .rich-card--notion .rich-card__title,
      .rich-card--notion .rich-card__description,
      .rich-card--notion .rich-card__domain {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .rich-card--notion .rich-card__title {
        font-size: 1rem;
      }

      .rich-card--notion .rich-card__description {
        font-size: 0.9rem;
        margin-top: 4px;
      }

      .rich-card--notion .rich-card__domain {
        display: block;
        margin-top: 7px;
      }

      #preview .marknote-footnotes {
        border-top: 1px solid var(--line-strong);
        color: var(--muted);
        font-size: 0.95em;
        margin-top: 32px;
      }

      @media (max-width: 980px) {
        .shell {
          padding: 14px;
        }

        .hero {
          align-items: flex-start;
          flex-direction: column;
        }

        #status {
          white-space: normal;
        }

        .workspace {
          grid-template-columns: 1fr;
        }


        #markdown {
          min-height: 48vh;
        }

        .preview-wrap {
          max-height: none;
        }
      }

      @media (max-width: 640px) {
        .rich-card--row {
          grid-template-columns: 1fr;
        }

        .rich-card--row .rich-card__image {
          min-height: 190px;
          order: -1;
        }
      }
    </style>

    <script src="./dist/strict-markdown-html-converter.js"></script>
    <script>
      const markdown = document.querySelector('#markdown')
      const preview = document.querySelector('#preview')
      const status = document.querySelector('#status')
      const { renderMarkdownToHtml } = StrictMarkdownHtmlConverter
      const fallbackImage = 'https://placehold.co/1200x630/f7efe3/b45309?text=Link+Preview'
      const cardCache = new Map()

      async function copyText (text) {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(text)
          return
        }

        const buffer = document.createElement('textarea')
        buffer.value = text
        buffer.setAttribute('readonly', '')
        buffer.style.position = 'fixed'
        buffer.style.opacity = '0'
        document.body.appendChild(buffer)
        buffer.select()
        document.execCommand('copy')
        buffer.remove()
      }

      function addCodeCopyButtons () {
        for (const pre of preview.querySelectorAll('pre')) {
          const code = pre.querySelector('code')
          if (!code) continue

          const language = [...code.classList]
            .find(className => className.startsWith('language-'))
            ?.slice('language-'.length) || 'text'

          const frame = document.createElement('div')
          frame.className = 'code-frame'
          pre.before(frame)

          const toolbar = document.createElement('div')
          toolbar.className = 'code-toolbar'
          const label = document.createElement('span')
          label.className = 'code-language'
          label.textContent = language

          toolbar.appendChild(label)
          frame.appendChild(toolbar)
          frame.appendChild(pre)

          const button = document.createElement('button')
          button.className = 'copy-code'
          button.type = 'button'
          button.textContent = 'Copy'
          button.setAttribute('aria-label', 'Copy code block')
          button.addEventListener('click', async () => {
            try {
              await copyText(code.textContent)
              button.textContent = 'Copied'
              button.classList.add('is-copied')
              status.textContent = 'Code copied'
              setTimeout(() => {
                button.textContent = 'Copy'
                button.classList.remove('is-copied')
              }, 1400)
            } catch (error) {
              status.textContent = 'Copy failed'
            }
          })
          toolbar.appendChild(button)
        }
      }

      function normalizeUrl (value) {
        const trimmed = value.trim()
        if (!trimmed) return ''
        return /^https?:\/\//i.test(trimmed) ? trimmed : `https://${trimmed}`
      }

      function domainFromUrl (value) {
        try {
          return new URL(normalizeUrl(value)).hostname.replace(/^www\./, '')
        } catch (error) {
          return value.replace(/^https?:\/\//i, '').split('/')[0] || 'link preview'
        }
      }

      function escapeHtml (value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;')
      }

      function shadowValueFor (depth) {
        const y = Math.max(2, Math.round(depth * 0.6))
        const blur = Math.max(10, Math.round(depth * 1.7))
        const alpha = Math.min(0.22, 0.06 + depth / 320)
        return depth > 0 ? `0 ${y}px ${blur}px rgba(64, 48, 31, ${alpha.toFixed(2)})` : 'none'
      }

      function cardLayoutStyleFor (state) {
        const declarations = []
        if (state.width) declarations.push(`width: ${state.width}`)
        if (state.height) declarations.push(`height: ${state.height}`)
        if (state.align === 'center') declarations.push('margin-left: auto', 'margin-right: auto')
        if (state.align === 'right') declarations.push('margin-left: auto')
        return declarations.join('; ')
      }

      function metadataFromMicrolink (payload, targetUrl) {
        const data = payload?.data || {}
        const image = data.image?.url || data.screenshot?.url || data.logo?.url || fallbackImage
        return {
          url: targetUrl,
          title: data.title || data.publisher || domainFromUrl(targetUrl),
          description: data.description || data.author || `Preview for ${domainFromUrl(targetUrl)}`,
          image,
          domain: data.publisher || domainFromUrl(data.url || targetUrl)
        }
      }

      async function fetchMetadata (rawUrl) {
        const targetUrl = normalizeUrl(rawUrl)
        if (!targetUrl) throw new Error('URL을 입력해 주세요.')
        if (cardCache.has(targetUrl)) return cardCache.get(targetUrl)

        const response = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(targetUrl)}`)
        if (!response.ok) throw new Error(`Microlink ${response.status}`)

        const payload = await response.json()
        if (payload.status !== 'success') throw new Error(payload.message || 'Metadata fetch failed')

        const metadata = metadataFromMicrolink(payload, targetUrl)
        cardCache.set(targetUrl, metadata)
        return metadata
      }

      function renderRuntimeCard (state) {
        const radius = `${state.radius}px`
        const shadow = shadowValueFor(state.shadow)
        const layoutStyle = cardLayoutStyleFor(state)
        const safe = {
          url: escapeHtml(state.url),
          title: escapeHtml(state.title),
          description: escapeHtml(state.description),
          image: escapeHtml(state.image),
          domain: escapeHtml(state.domain),
          radius: escapeHtml(radius),
          shadow: escapeHtml(shadow),
          fallback: escapeHtml(fallbackImage),
          layoutStyle: escapeHtml(layoutStyle)
        }
        const style = `border-radius: ${safe.radius}; box-shadow: ${safe.shadow};${safe.layoutStyle ? ` ${safe.layoutStyle};` : ''}`

        if (state.style === 'row') {
          return `<a class="rich-card rich-card--row" href="${safe.url}" target="_blank" rel="noopener noreferrer" style="${style}"><div class="rich-card__body"><span class="rich-card__domain">${safe.domain}</span><h3 class="rich-card__title">${safe.title}</h3><p class="rich-card__description">${safe.description}</p></div><img class="rich-card__image" src="${safe.image}" alt="" loading="lazy" onerror="this.src='${safe.fallback}'"></a>`
        }

        if (state.style === 'notion') {
          return `<a class="rich-card rich-card--notion" href="${safe.url}" target="_blank" rel="noopener noreferrer" style="${style}"><img class="rich-card__image" src="${safe.image}" alt="" loading="lazy" onerror="this.src='${safe.fallback}'" style="border-radius: max(6px, calc(${safe.radius} - 4px));"><div class="rich-card__body"><h3 class="rich-card__title">${safe.title}</h3><p class="rich-card__description">${safe.description}</p><span class="rich-card__domain">${safe.domain}</span></div></a>`
        }

        return `<a class="rich-card rich-card--classic" href="${safe.url}" target="_blank" rel="noopener noreferrer" style="${style}"><img class="rich-card__image" src="${safe.image}" alt="" loading="lazy" onerror="this.src='${safe.fallback}'"><div class="rich-card__body"><span class="rich-card__domain">${safe.domain}</span><h3 class="rich-card__title">${safe.title}</h3><p class="rich-card__description">${safe.description}</p></div></a>`
      }

      async function hydrateRichCards () {
        const cards = [...preview.querySelectorAll('.marknote-card')]
        await Promise.all(cards.map(async card => {
          const rawUrl = card.dataset.marknoteCardUrl || card.getAttribute('href') || card.textContent
          const url = normalizeUrl(rawUrl)
          const title = card.dataset.marknoteCardTitle || card.textContent || domainFromUrl(url)
          const style = card.dataset.marknoteCardLayout || 'classic'
          const fallbackState = {
            style,
            url,
            title,
            description: `Preview for ${domainFromUrl(url)}`,
            image: fallbackImage,
            domain: domainFromUrl(url),
            radius: 16,
            shadow: 18,
            width: card.dataset.marknoteCardWidth || '',
            height: card.dataset.marknoteCardHeight || '',
            align: card.dataset.marknoteCardAlign || ''
          }

          const template = document.createElement('template')
          template.innerHTML = renderRuntimeCard(fallbackState).trim()
          const renderedCard = template.content.firstElementChild
          card.replaceWith(renderedCard)

          try {
            const metadata = await fetchMetadata(url)
            if (!renderedCard.isConnected) return
            const hydrated = renderRuntimeCard({ ...fallbackState, ...metadata, title: title || metadata.title })
            renderedCard.outerHTML = hydrated
          } catch (error) {
            status.textContent = `${markdown.value.length} chars rendered; card metadata unavailable`
          }
        }))
      }

      function render () {
        try {
          const html = renderMarkdownToHtml(markdown.value)

          preview.innerHTML = html
          addCodeCopyButtons()
          hydrateRichCards()
          status.textContent = `${markdown.value.length} chars rendered`
        } catch (error) {
          preview.innerHTML = ''
          status.textContent = error instanceof Error ? error.message : String(error)
        }
      }


      markdown.addEventListener('input', render)
      render()
    </script>
  </body>
</html>
