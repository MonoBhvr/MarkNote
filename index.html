<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MarkNote Preview</title>
    <link rel="stylesheet" href="./dist/katex.min.css">
    <style>
      :root {
        --bg: #f4f1ea;
        --panel: #fffdf8;
        --panel-strong: #1f2933;
        --line: #d8d0c3;
        --line-strong: #b9ad9d;
        --text: #22201c;
        --muted: #746b5f;
        --accent: #b45309;
        --accent-soft: #fff1d6;
        --code: #f7efe3;
        color: var(--text);
        background: var(--bg);
        font-family: Georgia, "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      .shell {
        display: grid;
        gap: 18px;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 100vh;
        padding: 22px;
      }

      .hero {
        align-items: end;
        display: flex;
        gap: 18px;
        justify-content: space-between;
      }

      .eyebrow {
        color: var(--accent);
        font: 700 0.75rem/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        letter-spacing: 0.14em;
        margin: 0 0 8px;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(2rem, 4vw, 4rem);
        letter-spacing: -0.05em;
        line-height: 0.95;
        margin: 0;
      }

      .subtitle {
        color: var(--muted);
        line-height: 1.6;
        margin: 10px 0 0;
        max-width: 680px;
      }

      #status {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font: 0.85rem/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        margin: 0;
        padding: 10px 14px;
        white-space: nowrap;
      }

      .workspace {
        display: grid;
        gap: 18px;
        grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.08fr);
        min-height: 0;
      }

      .pane {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: 0 24px 70px rgba(64, 48, 31, 0.1);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 0;
        overflow: hidden;
      }

      .pane-header {
        align-items: center;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        padding: 14px 16px;
      }

      .pane-title {
        font: 700 0.82rem/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        letter-spacing: 0.12em;
        margin: 0;
        text-transform: uppercase;
      }

      .pane-note {
        color: var(--muted);
        font-size: 0.9rem;
      }

      #markdown {
        background: #181611;
        border: 0;
        color: #f8ecd7;
        font: 0.95rem/1.65 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        min-height: 70vh;
        outline: none;
        padding: 20px;
        resize: none;
        width: 100%;
      }

      .preview-wrap {
        min-height: 0;
        overflow: auto;
        padding: 24px;
      }

      #preview {
        line-height: 1.72;
        margin: 0 auto;
        max-width: 820px;
      }

      #preview > :first-child {
        margin-top: 0;
      }

      #preview h1,
      #preview h2,
      #preview h3 {
        letter-spacing: -0.03em;
        line-height: 1.1;
      }

      #preview h1 {
        border-bottom: 1px solid var(--line);
        font-size: 2.4rem;
        padding-bottom: 12px;
      }

      #preview h2 {
        color: #2f2a22;
        font-size: 1.45rem;
        margin-top: 34px;
      }

      #preview a {
        color: #9a3412;
      }

      #preview table {
        border-collapse: collapse;
        width: 100%;
      }

      #preview th,
      #preview td {
        border: 1px solid var(--line-strong);
        padding: 8px 10px;
        text-align: left;
      }

      #preview th {
        background: var(--accent-soft);
      }

      #preview blockquote {
        background: #faf4ea;
        border-left: 4px solid var(--accent);
        margin-left: 0;
        padding: 10px 16px;
      }

      #preview pre {
        background: var(--code);
        border: 0;
        border-radius: 0 0 12px 12px;
        overflow: auto;
        margin: 0;
        padding: 14px;
      }

      #preview .code-frame {
        background: var(--code);
        border: 1px solid var(--line);
        border-radius: 12px;
        margin: 16px 0;
        overflow: hidden;
      }

      #preview .code-toolbar {
        align-items: center;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        min-height: 40px;
        padding: 7px 10px 7px 14px;
      }

      #preview .code-language {
        color: var(--muted);
        font: 700 0.72rem/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      #preview .copy-code {
        background: var(--panel);
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        color: var(--muted);
        cursor: pointer;
        font: 700 0.72rem/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        letter-spacing: 0.08em;
        padding: 7px 10px;
        text-transform: uppercase;
        transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
      }

      #preview .copy-code:hover,
      #preview .copy-code:focus-visible {
        background: var(--accent-soft);
        border-color: var(--accent);
        color: var(--accent);
      }

      #preview .copy-code.is-copied {
        background: #ecfdf5;
        border-color: #059669;
        color: #047857;
      }

      #preview code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      #preview :not(pre) > code {
        background: var(--code);
        border-radius: 5px;
        padding: 2px 5px;
      }

      #preview .hljs-keyword,
      #preview .hljs-selector-tag,
      #preview .hljs-title {
        color: #9f1239;
      }

      #preview .hljs-string,
      #preview .hljs-attr,
      #preview .hljs-symbol {
        color: #0f766e;
      }

      #preview .hljs-number,
      #preview .hljs-literal {
        color: #1d4ed8;
      }

      #preview .hljs-comment {
        color: #78716c;
      }

      #preview .marknote-highlight {
        background: #fff3b0;
        border-radius: 4px;
        padding: 0 3px;
      }

      #preview .marknote-highlight-strong {
        background: #fed7aa;
        border-bottom: 2px solid var(--accent);
        border-radius: 4px;
        padding: 0 3px;
      }

      #preview .marknote-term {
        border-bottom: 1px dotted #5f554b;
        cursor: help;
      }

      #preview .marknote-fold,
      #preview .marknote-block {
        background: var(--marknote-block-color, #fffbf2);
        border: 1px solid var(--line-strong);
        border-radius: 14px;
        margin: 16px 0;
        padding: 12px 14px;
      }

      #preview .marknote-block-has-type:not(.marknote-fold) {
        display: grid;
        gap: 12px;
        grid-template-columns: auto minmax(0, 1fr);
      }

      #preview .marknote-block-marker {
        align-items: center;
        background: rgba(255, 255, 255, 0.65);
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        color: var(--accent);
        display: inline-flex;
        font: 800 0.82rem/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        height: 26px;
        justify-content: center;
        width: 26px;
      }

      #preview .marknote-block-content > :first-child {
        margin-top: 0;
      }

      #preview .marknote-block-content > :last-child {
        margin-bottom: 0;
      }

      #preview .marknote-block-color-red {
        --marknote-block-color: #fff1f2;
      }

      #preview .marknote-block-color-blue {
        --marknote-block-color: #eff6ff;
      }

      #preview .marknote-block-color-green {
        --marknote-block-color: #ecfdf5;
      }

      #preview .marknote-block-color-yellow {
        --marknote-block-color: #fefce8;
      }

      #preview .marknote-block-color-orange {
        --marknote-block-color: #fff7ed;
      }

      #preview .marknote-block-color-purple {
        --marknote-block-color: #faf5ff;
      }

      #preview .marknote-block-color-gray {
        --marknote-block-color: #f5f5f4;
      }

      #preview .marknote-fold summary {
        align-items: center;
        color: var(--accent);
        cursor: pointer;
        display: flex;
        gap: 10px;
        font-weight: 700;
        list-style: none;
      }

      #preview .marknote-fold summary::-webkit-details-marker {
        display: none;
      }

      #preview .marknote-fold summary::before {
        align-items: center;
        background: rgba(180, 83, 9, 0.1);
        border: 1px solid rgba(180, 83, 9, 0.25);
        border-radius: 999px;
        content: '›';
        display: inline-flex;
        flex: 0 0 auto;
        font: 900 1rem/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        height: 22px;
        justify-content: center;
        transition: transform 160ms ease, background 160ms ease;
        width: 22px;
      }

      #preview .marknote-fold[open] summary::before {
        background: rgba(180, 83, 9, 0.16);
        transform: rotate(90deg);
      }

      #preview .marknote-embed,
      #preview .marknote-card {
        display: block;
        margin: 16px 0;
      }

      #preview .marknote-embed img {
        border-radius: 12px;
        max-width: 100%;
      }

      #preview .marknote-embed iframe {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 12px;
        min-height: 180px;
        width: 100%;
      }

      #preview .marknote-card {
        background: #fff7e8;
        border: 1px solid var(--line-strong);
        border-radius: 14px;
        color: #92400e;
        font-weight: 700;
        padding: 14px;
        text-decoration: none;
      }

      #preview .marknote-footnotes {
        border-top: 1px solid var(--line-strong);
        color: var(--muted);
        font-size: 0.95em;
        margin-top: 32px;
      }

      @media (max-width: 980px) {
        .shell {
          padding: 14px;
        }

        .hero {
          align-items: flex-start;
          flex-direction: column;
        }

        #status {
          white-space: normal;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        #markdown {
          min-height: 48vh;
        }

        .preview-wrap {
          max-height: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">MarkNote live preview</p>
          <h1>Write left. Read right.</h1>
          <p class="subtitle">A file-system friendly test page for the MarkNote renderer. Edit the source on the left and inspect the rendered document on the right.</p>
        </div>
        <p id="status">Ready</p>
      </header>

      <section class="workspace" aria-label="MarkNote editor and preview">
        <article class="pane editor-pane">
          <div class="pane-header">
            <h2 class="pane-title">Editor</h2>
            <span class="pane-note">MarkNote source</span>
          </div>
          <textarea id="markdown" spellcheck="false">@MarkNote : Markdown-based notes with math, embeds, anchors, comments, and glossary terms.
@Typst : The math input syntax used by MarkNote formulas.

# MarkNote syntax showcase {#}

MarkNote keeps strict Markdown behavior while adding custom syntax. This page updates in **real time** and leaves raw HTML escaped.

| Feature | Expected |
| - | - |
| Table | rendered |
| ~~Strike~~ | kept |
| Bare URL | https://example.com stays plain |

> Blockquote keeps a simple left bar.

## Math {#math}

Inline Typst math: $x_1^2 + sqrt(y) = z$.

$$
phi.alt = (1 + sqrt(5)) / 2
sum_(i = 1)^n i = n(n + 1) / 2
$$

Escaped price text: \$2 and \$15 are not formulas.

## Highlights and footnotes {#highlights}

Use ==weak highlight== and ===strong highlight=== inside normal text.

Footnotes can be unnamed[^ **Bold footnote** with [a link](https://example.com).] or named[^(memo) Named footnote content.]

]]

*/

            </textarea>
        </article>

        <article class="pane preview-pane">
          <div class="pane-header">
            <h2 class="pane-title">Preview</h2>
            <span class="pane-note">Rendered HTML view</span>
          </div>
          <div class="preview-wrap">
            <div id="preview"></div>
          </div>
        </article>
      </section>
    </main>

    <script src="./dist/strict-markdown-html-converter.js"></script>
    <script>
      const markdown = document.querySelector('#markdown')
      const preview = document.querySelector('#preview')
      const status = document.querySelector('#status')
      const { renderMarkdownToHtml } = StrictMarkdownHtmlConverter

      async function copyText (text) {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(text)
          return
        }

        const buffer = document.createElement('textarea')
        buffer.value = text
        buffer.setAttribute('readonly', '')
        buffer.style.position = 'fixed'
        buffer.style.opacity = '0'
        document.body.appendChild(buffer)
        buffer.select()
        document.execCommand('copy')
        buffer.remove()
      }

      function addCodeCopyButtons () {
        for (const pre of preview.querySelectorAll('pre')) {
          const code = pre.querySelector('code')
          if (!code) continue

          const language = [...code.classList]
            .find(className => className.startsWith('language-'))
            ?.slice('language-'.length) || 'text'

          const frame = document.createElement('div')
          frame.className = 'code-frame'
          pre.before(frame)

          const toolbar = document.createElement('div')
          toolbar.className = 'code-toolbar'
          const label = document.createElement('span')
          label.className = 'code-language'
          label.textContent = language

          toolbar.appendChild(label)
          frame.appendChild(toolbar)
          frame.appendChild(pre)

          const button = document.createElement('button')
          button.className = 'copy-code'
          button.type = 'button'
          button.textContent = 'Copy'
          button.setAttribute('aria-label', 'Copy code block')
          button.addEventListener('click', async () => {
            try {
              await copyText(code.textContent)
              button.textContent = 'Copied'
              button.classList.add('is-copied')
              status.textContent = 'Code copied'
              setTimeout(() => {
                button.textContent = 'Copy'
                button.classList.remove('is-copied')
              }, 1400)
            } catch (error) {
              status.textContent = 'Copy failed'
            }
          })
          toolbar.appendChild(button)
        }
      }

      function render () {
        try {
          const html = renderMarkdownToHtml(markdown.value)

          preview.innerHTML = html
          addCodeCopyButtons()
          status.textContent = `${markdown.value.length} chars rendered`
        } catch (error) {
          preview.innerHTML = ''
          status.textContent = error instanceof Error ? error.message : String(error)
        }
      }

      markdown.addEventListener('input', render)
      render()
    </script>
  </body>
</html>
